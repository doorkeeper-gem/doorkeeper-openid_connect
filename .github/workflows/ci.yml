name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    name: >-
      Ruby ${{ matrix.ruby }} (${{ matrix.gemfile }})
    env:
      CI: true
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}

    runs-on: ${{ matrix.os }}
    if: |
      !(   contains(github.event.pull_request.title,  '[ci skip]')
        || contains(github.event.pull_request.title,  '[skip ci]'))
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ruby:
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
          - head
        gemfile:
          - gemfiles/rails_7.0.gemfile
          - gemfiles/rails_7.1.gemfile
          - gemfiles/rails_7.2.gemfile
          - gemfiles/rails_8.0.gemfile
          - gemfiles/doorkeeper_master.gemfile
        exclude:
          - ruby: head
            gemfile: gemfiles/rails_7.0.gemfile
        # Oldest supported Doorkeeper series — one Ruby each is enough to
        # keep the `>= 5.5` gemspec constraint honest.
        include:
          - ruby: "3.4"
            os: ubuntu-latest
            gemfile: gemfiles/doorkeeper_5.5.gemfile
          - ruby: "3.4"
            os: ubuntu-latest
            gemfile: gemfiles/doorkeeper_5.6.gemfile
          - ruby: "3.4"
            os: ubuntu-latest
            gemfile: gemfiles/doorkeeper_5.7.gemfile
          # Newest supported Doorkeeper major — pins the 6.0 series
          # (currently 6.0.0.beta1), which `doorkeeper_master.gemfile` stops
          # covering as soon as upstream `main` moves on. Keeps the `< 7.0`
          # cap honest.
          - ruby: "3.4"
            os: ubuntu-latest
            gemfile: gemfiles/doorkeeper_6.0.gemfile
    steps:
      - name: Repo checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        timeout-minutes: 10
        run: bundle exec rake spec
  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    env:
      BUNDLE_PATH: /home/runner/bundle
    if: |
      !(   contains(github.event.pull_request.title,  '[ci skip]')
        || contains(github.event.pull_request.title,  '[skip ci]'))
    steps:
      - name: Repo checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install dependencies
        run: bundle install

      - name: Run RuboCop
        run: bundle exec rubocop
